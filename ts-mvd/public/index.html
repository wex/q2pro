<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Q2Pro Map Viewer</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <canvas id="map"></canvas>
    <canvas id="players"></canvas>
    <div id="status">
        <span id="status-conn">Connecting…</span>
        <span id="status-map"></span>
        <span id="status-entities"></span>
    </div>
    <div id="panel">
        <section id="scoreboard-section">
            <h3>Scoreboard</h3>
            <div id="team-scores"></div>
            <table id="scoreboard">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th class="num">Frags</th>
                        <th class="num">Ping</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <section id="killfeed-section">
            <h3>Kill feed</h3>
            <ul id="killfeed"></ul>
        </section>
        <section id="chat-section">
            <h3>Chat</h3>
            <ul id="chat"></ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
