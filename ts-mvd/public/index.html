<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Q2Pro Map Viewer</title>
    <link rel="stylesheet" href="app.css">
</head>

<body>
    <canvas id="map"></canvas>
    <canvas id="players"></canvas>
    <div id="status">
        <span id="status-conn">Idle</span>
        <span id="status-map"></span>
        <span id="status-time"></span>
        <span id="status-entities"></span>
        <button id="status-stop" type="button" hidden>Stop</button>
    </div>
    <div id="session-modal" class="modal">
        <div class="modal-card">
            <h2>ts-mvd</h2>
            <div class="tabs" role="tablist">
                <button type="button" class="tab active" data-tab="connect" role="tab">Connect to server</button>
                <button type="button" class="tab" data-tab="replay" role="tab">Replay a demo</button>
            </div>
            <form id="connect-form" class="tab-panel active" data-tab="connect">
                <label>
                    Hostname
                    <input id="connect-host" type="text" value="127.0.0.1" required autocomplete="off">
                </label>
                <label>
                    Port
                    <input id="connect-port" type="number" min="1" max="65535" value="27910" required>
                </label>
                <button type="submit">Connect</button>
            </form>
            <form id="replay-form" class="tab-panel" data-tab="replay">
                <label>
                    Demo
                    <select id="demo-select" required></select>
                </label>
                <button type="submit">Replay</button>
            </form>
            <div id="session-error" class="error" hidden></div>
        </div>
    </div>
    <div id="panel">
        <section id="scoreboard-section">
            <h3>Scoreboard</h3>
            <div id="team-scores"></div>
            <table id="scoreboard">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th class="num">Frags</th>
                        <th class="num">Ping</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <section id="killfeed-section">
            <h3>Kill feed</h3>
            <ul id="killfeed"></ul>
        </section>
        <section id="chat-section">
            <h3>Chat</h3>
            <ul id="chat"></ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
